name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ScenicFetch.slnx

      - name: Build
        run: dotnet build ScenicFetch.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ScenicFetch.slnx --no-build --configuration Release

      - name: CLI Smoke Check
        run: dotnet run --project src/ScenicFetch.Cli/ScenicFetch.Cli.csproj -- sources list --json
